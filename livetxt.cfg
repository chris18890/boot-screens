LABEL ubuntu-resolute-desktop
    MENU LABEL ubuntu resolute desktop
    KERNEL ubuntu-live/resolute/casper/vmlinuz
    APPEND initrd=ubuntu-live/resolute/casper/initrd root=/dev/nfs boot=casper ip=dhcp netboot=nfs nfsroot=192.168.0.5:/volume1/pxe/ubuntu-live/resolute splash toram --
